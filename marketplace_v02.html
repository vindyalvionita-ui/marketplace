<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Collection</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Didact+Gothic&display=swap" rel="stylesheet" />
  <style>
    :root {
      --cream: #f5f0e8;
      --ivory: #faf7f2;
      --gold: #b8975a;
      --gold-light: #d4b483;
      --charcoal: #1a1a18;
      --stone: #8a8478;
      --border: rgba(184,151,90,0.25);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: var(--ivory);
      color: var(--charcoal);
      font-family: 'Didact Gothic', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Subtle noise texture */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.035'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.6;
    }

    header {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 72px 40px 48px;
      border-bottom: 1px solid var(--border);
    }

    .brand-rule {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 18px;
      margin-bottom: 24px;
      opacity: 0;
      animation: fadeUp 1s ease forwards 0.1s;
    }

    .brand-rule span {
      display: block;
      width: 60px;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--gold));
    }

    .brand-rule span:last-child {
      background: linear-gradient(to left, transparent, var(--gold));
    }

    .brand-rule svg {
      width: 14px;
      height: 14px;
      fill: var(--gold);
    }

    header h1 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(2.8rem, 6vw, 5rem);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--charcoal);
      line-height: 1;
      opacity: 0;
      animation: fadeUp 1s ease forwards 0.25s;
    }

    header p {
      margin-top: 14px;
      font-size: 0.72rem;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: var(--stone);
      opacity: 0;
      animation: fadeUp 1s ease forwards 0.4s;
    }

    /* Grid */
    .collection {
      position: relative;
      z-index: 1;
      max-width: 1280px;
      margin: 0 auto;
      padding: 72px 40px 96px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 48px 36px;
    }

    /* Loading state */
    .loading-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 60px 0;
      opacity: 0;
      animation: fadeUp 0.6s ease forwards 0.5s;
    }

    .loading-state p {
      font-size: 0.65rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--stone);
    }

    .loading-dots {
      display: inline-flex;
      gap: 6px;
      margin-top: 14px;
    }

    .loading-dots span {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--gold);
      animation: pulse 1.2s ease-in-out infinite;
    }

    .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
    .loading-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes pulse {
      0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
      40% { opacity: 1; transform: scale(1); }
    }

    /* Error state */
    .error-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 60px 0;
    }

    .error-state p {
      font-size: 0.65rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--stone);
    }

    .error-state strong {
      display: block;
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.4rem;
      font-weight: 300;
      color: var(--charcoal);
      margin-bottom: 10px;
      letter-spacing: 0.05em;
    }

    /* Card */
    .card {
      position: relative;
      display: flex;
      flex-direction: column;
      background: transparent;
      cursor: pointer;
      opacity: 0;
      animation: fadeUp 0.9s ease forwards;
    }

    .card-image-wrap {
      position: relative;
      overflow: hidden;
      aspect-ratio: 3 / 4;
      background: var(--cream);
    }

    /* Gold corner accents */
    .card-image-wrap::before,
    .card-image-wrap::after {
      content: '';
      position: absolute;
      width: 20px;
      height: 20px;
      z-index: 2;
      transition: width 0.4s ease, height 0.4s ease;
    }

    .card-image-wrap::before {
      top: 10px; left: 10px;
      border-top: 1px solid var(--gold);
      border-left: 1px solid var(--gold);
    }

    .card-image-wrap::after {
      bottom: 10px; right: 10px;
      border-bottom: 1px solid var(--gold);
      border-right: 1px solid var(--gold);
    }

    .card:hover .card-image-wrap::before,
    .card:hover .card-image-wrap::after {
      width: 36px;
      height: 36px;
    }

    .card-image-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94), filter 0.6s ease;
      filter: saturate(0.9) brightness(0.97);
    }

    .card:hover .card-image-wrap img {
      transform: scale(1.06);
      filter: saturate(1) brightness(1);
    }

    /* Hover overlay */
    .card-overlay {
      position: absolute;
      inset: 0;
      background: rgba(26,26,24,0.0);
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding-bottom: 28px;
      transition: background 0.4s ease;
      z-index: 3;
    }

    .card:hover .card-overlay {
      background: rgba(26,26,24,0.22);
    }

    .btn-view {
      font-family: 'Didact Gothic', sans-serif;
      font-size: 0.62rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--ivory);
      border: 1px solid rgba(245,240,232,0.7);
      padding: 9px 22px;
      background: transparent;
      cursor: pointer;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.35s ease, transform 0.35s ease, background 0.3s ease;
    }

    .card:hover .btn-view {
      opacity: 1;
      transform: translateY(0);
    }

    .btn-view:hover {
      background: rgba(245,240,232,0.12);
    }

    /* Card info */
    .card-info {
      padding: 18px 4px 0;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .card-tag {
      font-size: 0.6rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--gold);
    }

    .card-name {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: 1.35rem;
      letter-spacing: 0.04em;
      color: var(--charcoal);
      line-height: 1.2;
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid var(--border);
    }

    .card-price {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.05rem;
      font-weight: 400;
      letter-spacing: 0.06em;
      color: var(--charcoal);
    }

    .card-price span {
      font-size: 0.75rem;
      color: var(--stone);
      margin-right: 2px;
    }

    .card-add {
      font-size: 0.58rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--stone);
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px 0;
      position: relative;
      transition: color 0.3s ease;
    }

    .card-add::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 1px;
      background: var(--gold);
      transform: scaleX(0);
      transition: transform 0.3s ease;
    }

    .card-add:hover { color: var(--gold); }
    .card-add:hover::after { transform: scaleX(1); }

    /* Footer */
    footer {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 32px;
      border-top: 1px solid var(--border);
    }

    footer p {
      font-size: 0.6rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--stone);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(22px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 600px) {
      .collection { padding: 48px 20px 72px; gap: 36px 24px; }
      header { padding: 48px 20px 36px; }
    }
  </style>
</head>
<body>

<header>
  <div class="brand-rule">
    <span></span>
    <svg viewBox="0 0 24 24"><path d="M12 2 L14.5 9.5 L22 9.5 L16 14 L18.5 21.5 L12 17 L5.5 21.5 L8 14 L2 9.5 L9.5 9.5 Z"/></svg>
    <span></span>
  </div>
  <h1>The Collection</h1>
  <p>Curated with intention &nbsp;·&nbsp; Crafted with care</p>
</header>

<main class="collection" id="productGrid">
  <div class="loading-state">
    <p>Loading collection</p>
    <div class="loading-dots">
      <span></span><span></span><span></span>
    </div>
  </div>
</main>

<footer>
  <p>&copy; 2026 &nbsp;·&nbsp; All rights reserved</p>
</footer>

<script>
  // ── Configuration ──────────────────────────────────────────────────────────
  const SHEET_CSV_URL =
    'https://docs.google.com/spreadsheets/d/e/2PACX-1vTuCXJg2jPlgXqywMMlnZZbU2A_v7--0qkW5xJsuvVNLeAqtivZznrcKZVCBEOMy9XqX_QS4KDYJLCU/pub?output=csv';

  // ── CSV parser (handles quoted fields with commas / newlines) ──────────────
  function parseCSV(text) {
    const rows = [];
    let cur = '', inQuote = false, row = [];

    for (let i = 0; i < text.length; i++) {
      const ch = text[i];
      if (ch === '"') {
        if (inQuote && text[i + 1] === '"') { cur += '"'; i++; }
        else { inQuote = !inQuote; }
      } else if (ch === ',' && !inQuote) {
        row.push(cur.trim()); cur = '';
      } else if ((ch === '\n' || ch === '\r') && !inQuote) {
        if (ch === '\r' && text[i + 1] === '\n') i++;
        row.push(cur.trim()); cur = '';
        if (row.some(Boolean)) rows.push(row);
        row = [];
      } else {
        cur += ch;
      }
    }
    if (cur || row.length) { row.push(cur.trim()); rows.push(row); }
    return rows;
  }

  // ── Map CSV rows → product objects using header row ───────────────────────
  function rowsToProducts(rows) {
    if (rows.length < 2) return [];
    const headers = rows[0].map(h => h.toLowerCase().trim());
    return rows.slice(1).map(row => {
      const obj = {};
      headers.forEach((h, i) => { obj[h] = row[i] || ''; });
      return obj;
    }).filter(p => p.name); // skip blank rows
  }

  // ── Render a single card ──────────────────────────────────────────────────
  function cardHTML(p, index) {
    // Support both "image" and "image url" / "imageurl" column names
    const img = p.image || p['image url'] || p['imageurl'] || p['img'] || '';
    const tag = p.tag || p.category || p.type || '';
    const price = p.price || '';
    const name = p.name || '';
    const delay = (0.3 + index * 0.15).toFixed(2);

    return `
      <article class="card" style="animation-delay:${delay}s">
        <div class="card-image-wrap">
          ${img
            ? `<img src="${escHtml(img)}" alt="${escHtml(name)}" loading="lazy" />`
            : `<div style="width:100%;height:100%;background:var(--cream);"></div>`
          }
          <div class="card-overlay">
            <button class="btn-view">View Details</button>
          </div>
        </div>
        <div class="card-info">
          <span class="card-tag">${escHtml(tag)}</span>
          <h2 class="card-name">${escHtml(name)}</h2>
          <div class="card-footer">
            <div class="card-price"><span>$</span>${escHtml(price)}</div>
            <button class="card-add">Add to cart</button>
          </div>
        </div>
      </article>`;
  }

  function escHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  // ── Fetch + render ────────────────────────────────────────────────────────
  async function loadCollection() {
    const grid = document.getElementById('productGrid');

    try {
      const res = await fetch(SHEET_CSV_URL);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const csv = await res.text();
      const rows = parseCSV(csv);
      const products = rowsToProducts(rows);

      if (products.length === 0) throw new Error('No products found in sheet');

      grid.innerHTML = products.map((p, i) => cardHTML(p, i)).join('');
    } catch (err) {
      console.error('Failed to load collection:', err);
      grid.innerHTML = `
        <div class="error-state">
          <strong>Collection unavailable</strong>
          <p>Unable to load products. Please try again shortly.</p>
        </div>`;
    }
  }

  loadCollection();
</script>

</body>
</html>
